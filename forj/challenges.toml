[condpull]
challenge = "1 2 1 [pull pull]?!"
result = "1"

[condpull2]
challenge = "1 2 1 pull ?!"
result = "1 2"

[verboseclosure]
challenge = """
  :"n" literal entype!
  5 =!
  [n [literal:+]!!] "ok" assign!
  1 ok!
  2 ok!
  n 7 =!
  3 ok!
"""
result = "7 6 7 7 10"

[literaladd]
challenge = """
  :"n" literal entype! pull!
  1 2 literal:+ !
"""
result = "3"

[addclosure]
challenge = """
  :"n" literal entype! pull!
  1 2 n:+ !
"""
result = "3"

[addclosure2]
challenge = """
  :"n" literal entype! pull!
  1 2 [n:+] !
"""
result = "3"

[implicit]
challenge = """
  :"n" literal entype!
  n:[
    [n +] "+" assign!
  ] pull!
  n 2 =! pull!
  1 n:+!
  10 n:+!
  1 2 +!
"""
result = """2 3 12 3"""

[clone]
challenge = """
  :"n" literal entype!
  4 =! clone!
  n n 9 +! =!
  n (n = 4)
  2 push! (clone = 13)
"""
result = "4 13 13 4"

[assign]
challenge = """
  1 "a" assign !
  a literal entype!
"""
result = "1"

[shallowclone]
challenge = """
  :"n" :"m"
  m:"z"
  literal entype!
  2 =!
  m:z
  m:z clone! "b" assign!
  (the clone isn't deep:
    references to variables are not copied)
  m clone! "o" assign!
  o:z o:z 2 +! =!
  o:z b
"""
result = "n:[] m:[] 4 4 4 4 2"

[fib]
challenge = """
  [0 push 2 swap +!!] "fib" assign!
  1 1
  fib! fib! fib! fib! fib!
"""
result = "8 13"

[factorial]
challenge = """
  :"factorial"
  [
    0 push 1 -
    [factorial ->] ?!!
    *
  ] <-!
  factorial array entype! pull!

  1 5 factorial ->! !
"""
result = "120"

[rv64]
challenge = "`.quad t0`"
result = "\".quad t0\""

[pusharray]
challenge = """
  :"arr"
  array entype!
  ["hi"] <-!
  arr:[4 5 6] pull!
  arr:[1 2] pull!
  arr:[pull! push!]
"""
result = "[ 4 5 6 5 ]"

[mapvect]
challenge = """
  :"arr" pull!
  arr:[1 2 3 4] [1 +] map!
  arr
"""
result = "[ 2 3 4 5 ] [ 1 2 3 4 ] "

[identmap]
challenge = """
  :"arr" pull!
  :"n" literal entype! 4 =! pull!
  arr:[1 2 3 n]
  [] map!
  "arr2" assign!
  arr2
  arr
  arr clone map!
  n n 1 +! =!
"""
result = "[ 1 2 3 5 ] [ 1 2 3 5 ] [ 1 2 3 4 ] 5"

[clonemap]
challenge = """
  :"arr" pull!
  arr:[1 2 3 4]
  clone map!
  "arr2" assign!
  arr2:[+!]
  arr
"""
result = "[ 1 2 7 ] [ 1 2 3 4 ]"

[infunc]
challenge = """
  :"stk"
  [1 0 push] in !
  stk + in!
  stk
"""
result = "[ 2 ]"

[foldarr]
challenge = """
  :"arr" pull!
  :"n" array entype! pull!
  arr:[1 2 3 4]
  [n [[+]] in] map!
  arr n apply!
"""
result = "10"

[args]
challenge = """
  :"func" array entype! pull!
  :"arr" array entype! pull!
  func:[1 + "a" assign] pull!
  arr:[1 2 3 4]
  [arr func in] "wrap" assign!
  array entype! pull!
  arr clone map!
  wrap! arr clone map!
  wrap! arr clone map!
  wrap! arr clone map!
  arr:a
"""
result = "[ 1 2 3 4 ]   [ 1 2 3 ]   [ 1 2 ]   [ 1 ]  3 "

[object]
challenge = """
  :"class" pull!
  class:[
    :"construct" pull!
    construct:[
      :"this" class <-! pull!
    ]
  ]
  class:construct:this ->! [1] in!
  class:construct:this ->! ["a" assign] in!
  class:a
"""
result = "[ construct:[] ] 1"

[zip]
challenge = """
  :"zip1" array entype! pull!
  :"zip2" array entype! pull!
  zip1:[1 2 3 4] pull!
  zip2:[5 6 7 8] pull!
  zip1 zip2 apply!
"""
result = "1 5 2 6 3 7 4 8"

[foldfunc]
challenge = """
  :"arr" array entype! pull!
  arr [1 2 3 4] in!

  :"fold" array entype! pull!

  fold:[
    :"farr" array entype! pull!
    :"f" array entype! pull!
    :"v" array entype! pull!

    v -> [farr [f ->] in] map
    v -> farr apply
  ] pull!
  fold:v arr <-!
  fold:f [+] <-!
  fold!
"""
result = "10"