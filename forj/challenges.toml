    0 push!! 1 -!!
    0 push!!
    0 push!!
    not!! pull ?!!
    [factorial ->!! !!] ?!!
    *!!
  ] <-!
  factorial array entype! pull!

  1 5 factorial ->! !
"""
result = "120"

