[foldfunc]
challenge = """
  "arr" declare! array entype! pull!
  arr [1 2 3 4] in!

  "fold" declare! array entype! pull!

  fold:[
    "farr" declare! array entype! pull!
    "f" declare! array entype! pull!
    "v" declare! array entype! pull!

    v -> [farr [f ->!!] in!!] map
    v -> farr apply
  ] pull!
  fold:v arr <-!
  fold:f + <-!
  fold run!
"""
result = "10"