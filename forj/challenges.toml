[depthvar1]
challenge = ":\"hi\" pull! hi:[ 1 2 3 :\"test\" 4 5 6 ] hi:test"
result = "[ 1 2 3 test:[] 4 5 6 ] test:[]  "

[depthvar2]
challenge = """:\"hi\" pull! hi:[ 1 2 3 4 5 6 ] hi"""
result = "[ 1 2 3 4 5 6 ] [ 1 2 3 4 5 6 ]  "

[depthvar3]
challenge = """
  :\"hi\" pull! hi:[ 1 2 3 :\"test\" 4 5 6 ]
  hi:test:[ :\"okay\" ]
  hi:test:okay
"""
result = "[ 1 2 3 [ okay:[] ] 4 5 6 ] [ okay:[] ] okay:[] "

[depthvar3fail]
challenge = """
  :\"hi\" hi:[ 1 2 3 :\"test\" 4 5 6 ]
  hi:test:[ :\"okay\" ]
  hi:test:okaye
"""
result = """
<4:67>:Couldn't find string 'okaye' in scope 'test'
  :"hi" hi:[ 1 2 3 :"test" 4 5 6 ]
  hi:test:[ :"okay" ]
  hi:test:!>>>>>okaye
"""

