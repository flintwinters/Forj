  array entype! pull!
  arr clone map!
  wrap! arr clone map!
  wrap! arr clone map!
  wrap! arr clone map!
  arr:a
"""
result = "[ 1 2 3 4 ]   [ 1 2 3 ]   [ 1 2 ]   [ 1 ]  3 "

[object]
