[nothing]
challenge = ""
result = ""

[one]
challenge = "1"
result = "1"

[basic]
challenge = "0 1 2"
result = "2 1 0"

[addfunc]
challenge = "1 4 +"
result = "+ 4 1"

[add]
challenge = "1 2 + !"
result = "3"

[arradd]
challenge = "[1 2 +] !"
result = "3"

[doublefunc]
challenge = "1 2 3 4 [+ +] !"
result = "9 1"

[execiftrue]
challenge = "1 [4 5 6 +] ?!"
result = "11 4 1"

[execiffalse]
challenge = "0 [4 5 6 +] ?!"
result = ""

[string]
challenge = "\"hello\""
result = "\"hello\""

[concat]
challenge = "\"hello\" \"hi\" concat!"
result = "\"hellohi\""

[comments]
challenge = "\"hello\" (comment test) \"hi\" concat!"
result = "\"hellohi\""

[newvar]
challenge = ":\"hi\""
result = "[]"

[vartest]
challenge = ":\"hi\" [[hi]]!"
result = "[ [] ]  []"

[depthvar1]
challenge = ":\"hi\" ,! hi:[ 1 2 3 :\"test\" 4 5 6 ] hi:test"
result = "[] [ 6 5 4 [] 3 2 1 ]"

[depthvar2]
challenge = """:\"hi\" ,! hi:[ 1 2 3 4 5 6 ] hi"""
result = "[ 6 5 4 3 2 1 ] [ 6 5 4 3 2 1 ]"

[depthvar3]
challenge = """
  :\"hi\" ,! hi:[ 1 2 3 :\"test\" 4 5 6 ]
  hi:test:[ :\"okay\" ]
  hi:test:okay
"""
result = "[] [ [] ] [ 6 5 4 [ [] ] 3 2 1 ]"

[depthvar3fail]
challenge = """
  :\"hi\" hi:[ 1 2 3 :\"test\" 4 5 6 ]
  hi:test:[ :\"okay\" ]
  hi:test:okaye
"""
result = """
<4:67>:Couldn't find string 'okaye' in scope 'test'
  :"hi" hi:[ 1 2 3 :"test" 4 5 6 ]
  hi:test:[ :"okay" ]
  hi:test:!>>>>>okaye
"""

[internalbreak]
challenge = "1 2 3 [4 5 breakpoint!]"
result = """[BREAK : 5 4 ]
  [ 5 4 ]  3 2 1"""

[readdouble]
challenge = "!!"
result = "!!"

[shallowbang]
challenge = "[1 2 3 + [4 5 +]]!"
result = "[ + 5 4 ]  5 1"

[deepbang]
challenge = "[1 2 3 + [4 5 +] !!] !"
result = "9 5 1"

[triple]
challenge = "[1 2 3 + [4 5 +] !!! ] !! ! !"
result = "9 5 1"

[depth4]
challenge = "[ 1 [ 2 [ 3 [4] !!] !!] !!] !"
result = "4 3 2 1"

[depth4_2]
