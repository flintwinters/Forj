result = "[] [ 6 5 4 3 2 1 ]"

[depthvar2]
challenge = """:\"hi\" hi:[ 1 2 3 4 5 6 ] hi"""
result = "[ 6 5 4 3 2 1 ] [ 6 5 4 3 2 1 ]"

