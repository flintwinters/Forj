[has2]
challenge = """
  (this is a proof of concept, runs in O of n, 
  it's better to just use the inbuilt "has",
  to take advantage of hashing)

  :"fold" pull!
  fold:"f" array! pull!
  fold:"v" array! pull!
  fold:"foldlink" fold <-!
  fold:[
    1 v ->!! length in!! pullfrom!! <!! [
      v ->!! f ->!! in!! pull!! fold:foldlink ->!! !!
    ] ?!!
  ] pull!
  fold array! pull!

  :"is" array! pull!
  is:[
    :"a" literal! pull!
    a 1 swap!! =!! pull!!
    [a ==!!] map!!

    fold:v 1 swap!! <-!!
    fold:f and <-!!
    fold!! fold:v ->!! !!
  ] pull!

  "hasvar" declare! array! pull!
  hasvar:[
      "a" declare! array! pull!
      a 1 swap!! string:expand!! <-!!
      dir!!
      [
        !! pull!!
        string:expand!!
        a ->!! !! is!!
      ] map !!

      fold:v 1 swap!! <-!!
      fold:f or <-!!
      fold!! fold:v ->!! !!
  ] pull!
  :"a"
  a:[:"b"] pull!
  "b" hasvar!
  a "c" hasvar!
"""
result = "1 0"

