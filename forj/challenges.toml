    "construct" declare! pull!
    construct:[
      "this" declare! class <-! pull!
    ]
  ]
  class:construct:this ->! [1] in!
  class:construct:this ->! ["a" assign!!] in!
  class:a
"""
result = "[ construct:[] ] 1"

