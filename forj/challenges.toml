[addclosure]
challenge = """
  :"n" 
  n literal entype!
  1 2 n:+ !
"""
result = "3"

[clone]
challenge = """
  :"n"
  n literal entype!
  n 4 set! clone!
  n n 9 +! set!
  n (n = 4)
  2 push! (clone = 13)
"""
result = "4 13 13 4"

[assign]
challenge = """
  1 "a" assign !
  a literal entype!
  a
"""
result = "1"

[miniclosure]
challenge = """
  :"n" :"m"
  m:"z"
  m:z literal entype!
  m:z 2 set!
  m:z
  m clone!
  (the clone isn't deep:
    references to variables are not copied)
  "o" assign!
  o:z o:z 2 +! set!
  o:z
"""
result = "4 4 4 4"

[fib]
challenge = """
  [[0 push 2 swap]!! +!!] "fib" assign!
  1 1
  fib! fib! fib! fib! fib! 
"""
result = "13 8"

[factorial]
challenge = """
  :"factorial"
  [breakpoint [0 push 1 -]!! [factorial [breakpoint] !!! *] ?!!] "factorial" assign!
  factorial array entype!
  5 factorial!
  factorial
"""
result = ""