[typecheck2]
challenge = """
  :"fold" pull!
  fold:"f" array! pull!
  fold:"v" array! pull!
  fold:"foldlink" fold <-!
  fold:[
    1 v ->!! length in!! pullfrom!! <!! [
      v ->!! f ->!! in!! pull!! fold:foldlink ->!! !!
    ] ?!!
  ] pull!
  fold array! pull!

  (there's some toml related issue
  with using hashes in strings,
  so I used 'is' instead)
  type:"is" array! pull!
  type:is:[
      :"a" literal! pull!
      a 1 swap!! =!! pull!!
      [type:is:a ==!!] map!!

      fold:v 1 swap!! <-!!
      fold:f or <-!!
      fold!! fold:v ->!! !!
  ] pull!

  [0 2 0] 1
  type:is!

  [0 1 0 0 1 0] 1
  type:is!

  [1 1 1] 1
  type:is!

  [0x-1 2 4] 1
  type:is!
"""
result = "0 1 1 0"

