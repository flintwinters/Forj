"""
result = """2 3 12 3"""

[clone]
challenge = """
  "n" declare! literal entype!
  4 =! clone!
  n n 9 +! =!
  n (n = 4)
  2 push! (clone = 13)
"""
result = "4 13 13 4"

[assign]
challenge = """
  1 "a" assign !
  a literal entype!
"""
result = "1"

[shallowclone]
challenge = """
  "n" declare! "m" declare!
  m:"z"
  literal entype!
  2 =!
  m:z
  m:z clone! "b" assign!
  (the clone isn't deep:
    references to variables are not copied)
  m clone! "o" assign!
  o:z o:z 2 +! =!
  o:z b
"""
result = "n:[] m:[] 4 4 4 4 2"

[fib]
challenge = """
  [0 push 2 swap +] "fib" assign!
  1 1
  fib run! fib run! fib run! fib run! fib run!
"""
result = "8 13"

[factorial]
